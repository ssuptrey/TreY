services:
  # ============================================
  # 1. Backend Service (Node.js API)
  # ============================================
  - type: web
    name: trey-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: "postgresql://postgres:Guccigeng77@db.crkhtiuwxeznikxrqdnd.supabase.co:6543/postgres"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: trey-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # ============================================
  # 2. Frontend Service (React SPA)
  # ============================================
  - type: web
    name: trey-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: CI
        value: "false" # This prevents the build from failing on minor warnings
      - key: NODE_VERSION
        value: "20"
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: trey-backend
          envVarKey: RENDER_EXTERNAL_URL